# ─── CD Pipeline: Deploy po úspěšném CI ───────────────────────────────────────
name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy-vercel:
    name: "Deploy to Vercel"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment úspěšný" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ─── Post-deploy healthcheck ────────────────────────────────────────────────
  healthcheck:
    name: "Post-deploy Healthcheck"
    runs-on: ubuntu-latest
    needs: deploy-vercel
    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Check health endpoint
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ needs.deploy-vercel.outputs.url }}" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Deployment is healthy (HTTP $HTTP_CODE)"
          else
            echo "⚠️ Deployment returned HTTP $HTTP_CODE"
            exit 1
          fi

  # ─── Trigger AI Loop po úspěšném deployi ────────────────────────────────────
  trigger-ai-loop:
    name: "Trigger AI Analysis"
    runs-on: ubuntu-latest
    needs: healthcheck
    if: ${{ vars.AI_LOOP_ENABLED == 'true' }}
    steps:
      - name: Dispatch AI Loop
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: post-deploy-analysis
          client-payload: '{"sha": "${{ github.sha }}", "scope": "full"}'
